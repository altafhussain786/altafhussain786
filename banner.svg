<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main holographic gradient -->
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="30%" style="stop-color:#001a0d"/>
      <stop offset="60%" style="stop-color:#000d1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>

    <!-- Glowing cyan-to-green gradient for text -->
    <linearGradient id="textGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="25%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#39ff14"/>
      <stop offset="75%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Purple-to-cyan for subtitle -->
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff2d78"/>
    </linearGradient>

    <!-- 3D grid gradient -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff4100;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ff41;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0.03"/>
    </linearGradient>

    <!-- Glow filter for text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for accents -->
    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan line pattern -->
    <pattern id="scanLines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="rgba(0,255,65,0.03)"/>
    </pattern>

    <!-- 3D perspective grid pattern -->
    <pattern id="grid3d" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    </pattern>

    <!-- Clip for rounded corners -->
    <clipPath id="roundClip">
      <rect width="900" height="280" rx="16"/>
    </clipPath>

    <!-- Holographic shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0); stop-opacity:0"/>
      <stop offset="45%" style="stop-color:rgba(255,255,255,0); stop-opacity:0"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.06); stop-opacity:1"/>
      <stop offset="55%" style="stop-color:rgba(255,255,255,0); stop-opacity:0"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0); stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-2 0" to="2 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

  </defs>

  <g clip-path="url(#roundClip)">

    <!-- Background -->
    <rect width="900" height="280" fill="url(#holoGrad)"/>

    <!-- 3D Perspective Grid Floor -->
    <g opacity="0.6">
      <!-- Horizontal lines converging to horizon -->
      <line x1="0" y1="280" x2="900" y2="180" stroke="#00ff41" stroke-width="0.4" opacity="0.15"/>
      <line x1="0" y1="280" x2="900" y2="200" stroke="#00ff41" stroke-width="0.4" opacity="0.12"/>
      <line x1="0" y1="280" x2="900" y2="220" stroke="#00ff41" stroke-width="0.4" opacity="0.10"/>
      <line x1="0" y1="280" x2="900" y2="240" stroke="#00ff41" stroke-width="0.4" opacity="0.08"/>
      <line x1="0" y1="280" x2="900" y2="260" stroke="#00ff41" stroke-width="0.4" opacity="0.06"/>

      <!-- Vertical lines perspective -->
      <line x1="0" y1="200" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>
      <line x1="100" y1="230" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.10"/>
      <line x1="200" y1="250" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
      <line x1="300" y1="265" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
      <line x1="450" y1="280" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
      <line x1="600" y1="265" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
      <line x1="700" y1="250" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
      <line x1="800" y1="230" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.10"/>
      <line x1="900" y1="200" x2="450" y2="160" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>
    </g>

    <!-- Grid overlay -->
    <rect width="900" height="280" fill="url(#grid3d)" opacity="0.4"/>

    <!-- Scan lines overlay -->
    <rect width="900" height="280" fill="url(#scanLines)"/>

    <!-- LEFT: Glowing orb / planet 3D effect -->
    <circle cx="120" cy="130" r="75" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.2"/>
    <circle cx="120" cy="130" r="60" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.25"/>
    <circle cx="120" cy="130" r="45" fill="none" stroke="#39ff14" stroke-width="1" opacity="0.3"/>
    <circle cx="120" cy="130" r="30" fill="radial-gradient(circle, #001a0d, #000)" stroke="#00ff41" stroke-width="1.5" opacity="0.5"/>
    <!-- Orbit rings -->
    <ellipse cx="120" cy="130" rx="75" ry="20" fill="none" stroke="#7b2fff" stroke-width="0.8" opacity="0.4" transform="rotate(-15, 120, 130)"/>
    <ellipse cx="120" cy="130" rx="90" ry="18" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.25" transform="rotate(20, 120, 130)"/>
    <!-- Orbit dot -->
    <circle cx="195" cy="130" r="4" fill="#00ffff" filter="url(#strongGlow)" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0 120 130" to="360 120 130" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="130" r="3" fill="#7b2fff" filter="url(#strongGlow)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="180 120 130" to="540 120 130" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- RIGHT: Hexagon 3D shape -->
    <polygon points="790,55 830,78 830,124 790,147 750,124 750,78" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
    <polygon points="790,70 820,87 820,121 790,138 760,121 760,87" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.5"/>
    <polygon points="790,85 810,97 810,121 790,133 770,121 770,97" fill="rgba(0,255,65,0.05)" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
    <!-- Inner glow dot -->
    <circle cx="790" cy="109" r="5" fill="#00ff41" filter="url(#strongGlow)" opacity="0.8"/>

    <!-- Floating particles -->
    <circle cx="700" cy="40" r="2" fill="#00ffff" opacity="0.7" filter="url(#glow)">
      <animate attributeName="cy" values="40;30;40" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="60" r="1.5" fill="#7b2fff" opacity="0.6" filter="url(#glow)">
      <animate attributeName="cy" values="60;50;60" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="50" r="2" fill="#39ff14" opacity="0.6" filter="url(#glow)">
      <animate attributeName="cy" values="50;38;50" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="200" r="1.5" fill="#ff2d78" opacity="0.5" filter="url(#glow)">
      <animate attributeName="cy" values="200;188;200" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="180" r="2" fill="#00ffff" opacity="0.5" filter="url(#glow)">
      <animate attributeName="cy" values="180;168;180" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Corner decorations -->
    <path d="M0,0 L40,0 M0,0 L0,40" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
    <path d="M900,0 L860,0 M900,0 L900,40" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
    <path d="M0,280 L40,280 M0,280 L0,240" stroke="#7b2fff" stroke-width="2" opacity="0.7"/>
    <path d="M900,280 L860,280 M900,280 L900,240" stroke="#7b2fff" stroke-width="2" opacity="0.7"/>

    <!-- Divider lines with glow -->
    <line x1="220" y1="50" x2="220" y2="230" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <line x1="680" y1="50" x2="680" y2="230" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

    <!-- MAIN TEXT: NAME with 3D shadow effect -->
    <!-- Shadow layer 1 (deepest) -->
    <text x="453" y="133" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#003311" opacity="0.8" letter-spacing="6">ALTAF HUSSAIN</text>
    <!-- Shadow layer 2 -->
    <text x="452" y="132" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#006622" opacity="0.6" letter-spacing="6">ALTAF HUSSAIN</text>
    <!-- Shadow layer 3 -->
    <text x="451" y="131" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#00994d" opacity="0.4" letter-spacing="6">ALTAF HUSSAIN</text>
    <!-- Main gradient text -->
    <text x="450" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="url(#textGrad1)" filter="url(#glow)" letter-spacing="6">ALTAF HUSSAIN</text>

    <!-- Subtitle with gradient -->
    <text x="452" y="172" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#002211" opacity="0.8" letter-spacing="4">◈ MERN STACK DEVELOPER ◈</text>
    <text x="450" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="url(#textGrad2)" filter="url(#glow)" letter-spacing="4">◈ MERN STACK DEVELOPER ◈</text>

    <!-- Tags row -->
    <!-- React tag -->
    <rect x="270" y="190" width="90" height="24" rx="4" fill="rgba(0,255,255,0.08)" stroke="#00ffff" stroke-width="0.8" opacity="0.8"/>
    <text x="315" y="206" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ffff" font-weight="700">[ React ]</text>

    <!-- Node tag -->
    <rect x="372" y="190" width="90" height="24" rx="4" fill="rgba(57,255,20,0.08)" stroke="#39ff14" stroke-width="0.8" opacity="0.8"/>
    <text x="417" y="206" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#39ff14" font-weight="700">[ Node.js ]</text>

    <!-- MongoDB tag -->
    <rect x="474" y="190" width="100" height="24" rx="4" fill="rgba(123,47,255,0.08)" stroke="#7b2fff" stroke-width="0.8" opacity="0.8"/>
    <text x="524" y="206" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#7b2fff" font-weight="700">[ MongoDB ]</text>

    <!-- Cloud tag -->
    <rect x="586" y="190" width="90" height="24" rx="4" fill="rgba(255,45,120,0.08)" stroke="#ff2d78" stroke-width="0.8" opacity="0.8"/>
    <text x="631" y="206" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ff2d78" font-weight="700">[ Cloud ]</text>

    <!-- Bottom status bar -->
    <rect x="0" y="245" width="900" height="35" fill="rgba(0,255,65,0.05)" stroke="none"/>
    <line x1="0" y1="245" x2="900" y2="245" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>

    <!-- Status dots -->
    <circle cx="30" cy="262" r="5" fill="#39ff14" filter="url(#strongGlow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="45" y="267" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.9">● ONLINE</text>

    <text x="450" y="267" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ffff" opacity="0.7">[ SYSTEM STATUS: OPERATIONAL ]</text>

    <text x="870" y="267" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#7b2fff" opacity="0.8">v2.0.26 █</text>

    <!-- Top label -->
    <text x="450" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.5" letter-spacing="8">⟨ GITHUB PROFILE ⟩</text>

    <!-- Shimmer overlay -->
    <rect width="900" height="280" fill="url(#shimmer)" rx="16"/>

    <!-- Border glow -->
    <rect width="900" height="280" rx="16" fill="none" stroke="url(#textGrad2)" stroke-width="1.5" opacity="0.5"/>

  </g>
</svg>
